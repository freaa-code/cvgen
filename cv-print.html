<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CV — Utskrift</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@page { margin: 12mm 14mm; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Outfit, sans-serif; font-size: 11px; color: #0f2a38; background: #fff; }

/* Screen toolbar */
.toolbar { display: flex; gap: 8px; padding: 12px 20px; background: #f0f6fa; border-bottom: 1px solid #c8dfe9; position: sticky; top: 0; z-index: 10; }
.btn-print { padding: 9px 20px; background: #2c5f7a; color: #fff; border: none; border-radius: 8px; font-family: Outfit, sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-print:hover { background: #0f2a38; }
.btn-close { padding: 9px 16px; background: #fff; color: #2c5f7a; border: 1px solid #c8dfe9; border-radius: 8px; font-family: Outfit, sans-serif; font-size: 13px; cursor: pointer; }

/* Content */
.page { max-width: 800px; margin: 0 auto; padding: 20px; }

.cv-header { border-bottom: 2px solid #c8dfe9; padding-bottom: 10px; margin-bottom: 14px; }
.cv-name { font-family: "Cormorant Garamond", serif; font-size: 30px; font-weight: 300; color: #0f2a38; }
.cv-name em { font-style: italic; color: #2c5f7a; }
.cv-title { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #7ab8d4; display: block; margin-top: 5px; }
.stats { display: flex; gap: 28px; margin-top: 10px; }
.stat-n { font-family: "Cormorant Garamond", serif; font-size: 28px; font-weight: 300; color: #2c5f7a; line-height: 1; }
.stat-l { font-family: "DM Mono", monospace; font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: #7a9eb0; margin-top: 2px; }

.sec { margin-bottom: 14px; page-break-inside: avoid; }
.sec-title { font-family: "DM Mono", monospace; font-size: 8px; letter-spacing: .18em; text-transform: uppercase; color: #6bcfb5; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #e4f0f6; }

.skills { display: flex; flex-wrap: wrap; gap: 4px; }
.skill { font-family: "DM Mono", monospace; font-size: 9px; padding: 2px 7px; border-radius: 10px; border: 1px solid #c8dfe9; background: #f0f6fa; color: #3d6a82; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
.skill.hi { background: #e8f7f3; border-color: #a8ddd0; color: #2a6b5a; }

.job { margin-bottom: 8px; page-break-inside: avoid; }
.job-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; flex-wrap: wrap; }
.job-yr { font-family: "DM Mono", monospace; font-size: 9px; background: #2c5f7a; color: #fff; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
.job-role { font-size: 12px; font-weight: 500; }
.job-co { font-family: "DM Mono", monospace; font-size: 9px; color: #7a9eb0; }
.job-desc { font-size: 10px; color: #3d6a82; margin: 2px 0 3px; line-height: 1.5; }
.job-buls { list-style: none; margin-bottom: 3px; }
.job-buls li { font-size: 10px; color: #3d6a82; padding-left: 12px; position: relative; line-height: 1.4; }
.job-buls li::before { content: "▸"; position: absolute; left: 0; color: #6bcfb5; font-size: 8px; top: 3px; }
.tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.tag { font-family: "DM Mono", monospace; font-size: 8px; padding: 1px 5px; border-radius: 8px; background: #e8f7f3; border: 1px solid #a8ddd0; color: #2a6b5a; print-color-adjust: exact; -webkit-print-color-adjust: exact; }

.edu-row { display: flex; gap: 12px; padding: 5px 0; border-bottom: 1px solid #f0f6fa; }
.edu-row:last-child { border-bottom: none; }
.edu-yr { font-family: "DM Mono", monospace; font-size: 9px; color: #7a9eb0; min-width: 80px; }
.edu-title { font-size: 11px; font-weight: 500; }
.edu-place { font-size: 10px; color: #7a9eb0; }

.about-intro { font-family: "Cormorant Garamond", serif; font-size: 15px; font-weight: 300; line-height: 1.6; color: #0f2a38; margin-bottom: 8px; }
.about-intro em { font-style: italic; color: #2c5f7a; }
.about-p { font-size: 10px; line-height: 1.7; color: #3d6a82; margin-bottom: 6px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.val-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 0; }
.val-item { padding: 8px; border: 1px solid #e4f0f6; border-radius: 6px; }
.val-icon { font-size: 14px; margin-bottom: 3px; }
.val-h { font-size: 10px; font-weight: 600; color: #0f2a38; margin-bottom: 2px; }
.val-p { font-size: 9px; color: #7a9eb0; line-height: 1.4; }

.ints { display: flex; flex-wrap: wrap; gap: 5px; }
.int-chip { font-size: 10px; padding: 3px 9px; border-radius: 20px; border: 1px solid #c8dfe9; background: #f0f6fa; color: #3d6a82; }

.lang-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; border-bottom: 1px solid #f0f6fa; }
.lang-row:last-child { border-bottom: none; }
.lang-n { font-size: 11px; font-weight: 500; min-width: 80px; }
.lang-l { font-family: "DM Mono", monospace; font-size: 9px; color: #7a9eb0; min-width: 70px; }
.lang-bar { flex: 1; height: 4px; background: #e4f0f6; border-radius: 2px; }
.lang-fill { height: 100%; border-radius: 2px; background: linear-gradient(to right, #7ab8d4, #6bcfb5); print-color-adjust: exact; -webkit-print-color-adjust: exact; }

.contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.contact-item { padding: 6px 8px; border: 1px solid #e4f0f6; border-radius: 6px; }
.contact-lbl { font-family: "DM Mono", monospace; font-size: 8px; letter-spacing: .08em; text-transform: uppercase; color: #7a9eb0; margin-bottom: 2px; }
.contact-val { font-size: 10px; font-weight: 500; color: #0f2a38; word-break: break-all; }

.pb { page-break-before: always; }

@media print {
  .toolbar { display: none !important; }
  .page { padding: 0; max-width: 100%; }
  body { font-size: 10px; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha512-GtAfRr+IWkORSuCbNnTq0fDSM8Z5JNakBbELBFfxMnIVbDVJE3psFB3MZsq+SNYBEWeSBiWXYeyeVqxMcOow==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

<div class="toolbar">
  <button class="btn-print" onclick="window.print()">🖨 Skriv ut / Lagre som PDF</button>
  <button class="btn-close" onclick="window.close()">✕ Lukk</button>
</div>

<div class="page" id="out"></div>

<script>
var P = window.opener;
if (!P) {
  document.getElementById('out').innerHTML = '<p style="padding:20px;color:#c0392b">Åpne denne siden fra CV-siden ved å trykke PDF-knappen.</p>';
} else {
  var L  = P.L  || 'no';
  var EX = P.EX || [];
  var T  = P.T  || {};
  var t  = T[L] || {};

  function g(id) { var el = P.document.getElementById(id); return el ? el.textContent.trim() : ''; }
  function gh(id){ var el = P.document.getElementById(id); return el ? el.innerHTML : ''; }
  function safe(s){ return typeof DOMPurify!=='undefined' ? DOMPurify.sanitize(s) : s.replace(/<script[^>]*>[\s\S]*?<\/script>/gi,''); }

  /* NAME / TITLE / STATS */
  var html =
    '<div class="cv-header">' +
      '<div class="cv-name">' + g('fname') + ' <em>' + g('flname') + '</em></div>' +
      '<span class="cv-title">' + g('ftitle') + '</span>' +
      '<div class="stats">' +
        '<div><div class="stat-n">' + g('s1') + '</div><div class="stat-l">' + g('sl1') + '</div></div>' +
        '<div><div class="stat-n">' + g('s2') + '</div><div class="stat-l">' + g('sl2') + '</div></div>' +
        '<div><div class="stat-n">' + g('s3') + '</div><div class="stat-l">' + g('sl3') + '</div></div>' +
        '<div><div class="stat-n">' + g('s4') + '</div><div class="stat-l">' + g('sl4') + '</div></div>' +
      '</div>' +
    '</div>';

  /* SKILLS */
  var skills = '';
  P.document.querySelectorAll('#skw .stag').forEach(function(el) {
    var txt = el.querySelector('.stag-text') ? el.querySelector('.stag-text').textContent.trim() : '';
    var hi  = el.classList.contains('hi') ? ' hi' : '';
    if (txt) skills += '<span class="skill' + hi + '">' + txt + '</span>';
  });
  html += '<div class="sec"><div class="sec-title">' + (t.lsk||'Kjernekompetanse') + '</div><div class="skills">' + skills + '</div></div>';

  /* JOBS */
  var jobs = '';
  EX.forEach(function(x) {
    var r  = typeof x.r === 'object' ? x.r[L] : x.r;
    var co = typeof x.c === 'object' ? x.c[L] : x.c;
    var d  = x.d[L];
    var bs = x.b[L].map(function(b){ return '<li>' + b + '</li>'; }).join('');
    var ts = x.t.map(function(tg){ return '<span class="tag">' + tg + '</span>'; }).join('');
    jobs +=
      '<div class="job">' +
        '<div class="job-top">' +
          '<span class="job-yr">' + x.y + '</span>' +
          '<span class="job-role">' + r + '</span>' +
          '<span class="job-co">' + co + '</span>' +
        '</div>' +
        '<div class="job-desc">' + d + '</div>' +
        '<ul class="job-buls">' + bs + '</ul>' +
        '<div class="tags">' + ts + '</div>' +
      '</div>';
  });
  html += '<div class="sec"><div class="sec-title">' + (t.lex||'Arbeidserfaring') + '</div>' + jobs + '</div>';

  /* EDUCATION */
  var edu = '';
  P.document.querySelectorAll('#edl .ei').forEach(function(ei) {
    var yr = ei.querySelector('.ey')            ? ei.querySelector('.ey').textContent.trim()            : '';
    var ti = ei.querySelector('strong')         ? ei.querySelector('strong').textContent.trim()         : '';
    var pl = ei.querySelector('.einfo span')    ? ei.querySelector('.einfo span').textContent.trim()    : '';
    edu += '<div class="edu-row"><div class="edu-yr">' + yr + '</div><div><div class="edu-title">' + ti + '</div><div class="edu-place">' + pl + '</div></div></div>';
  });
  html += '<div class="sec"><div class="sec-title">' + (t.led||'Utdanning') + '</div>' + edu + '</div>';

  /* PAGE BREAK before About */
  html += '<div class="pb"></div>';

  /* ABOUT */
  html +=
    '<div class="sec"><div class="sec-title">' + (t.t2||'Om meg') + '</div>' +
      '<p class="about-intro">' + safe(gh('ain')) + '</p>' +
      '<p class="about-p">' + g('ap1') + '</p>' +
      '<p class="about-p">' + g('ap2') + '</p>' +
    '</div>';

  /* VALUES + INTERESTS + LANGS */
  var vals = '';
  P.document.querySelectorAll('#vgrid .vc').forEach(function(vc) {
    var ic = vc.querySelector('.ic') ? vc.querySelector('.ic').textContent.trim() : '';
    var h  = vc.querySelector('h4')  ? vc.querySelector('h4').textContent.trim()  : '';
    var p  = vc.querySelector('p')   ? vc.querySelector('p').textContent.trim()   : '';
    vals += '<div class="val-item"><div class="val-icon">' + ic + '</div><div class="val-h">' + h + '</div><div class="val-p">' + p + '</div></div>';
  });

  var ints = '';
  P.document.querySelectorAll('#intwrap .ic2').forEach(function(ic) {
    var spans = Array.from(ic.querySelectorAll('span:not(.ic2del)'));
    var txt = spans.map(function(s){ return s.textContent.trim(); }).join(' ').trim();
    if (txt) ints += '<span class="int-chip">' + txt + '</span>';
  });

  var langs = '';
  P.document.querySelectorAll('#langl .lr').forEach(function(lr) {
    var n   = lr.querySelector('.ln')  ? lr.querySelector('.ln').textContent.trim()  : '';
    var lv  = lr.querySelector('.ll')  ? lr.querySelector('.ll').textContent.trim()  : '';
    var pct = lr.querySelector('.lbw') ? (lr.querySelector('.lbw').dataset.pct||'50')+'%' : '50%';
    langs += '<div class="lang-row"><div class="lang-n">' + n + '</div><div class="lang-l">' + lv + '</div><div class="lang-bar"><div class="lang-fill" style="width:' + pct + '"></div></div></div>';
  });

  html +=
    '<div class="two-col">' +
      '<div class="sec"><div class="sec-title">' + (t.lval||'Verdier') + '</div><div class="val-grid">' + vals + '</div></div>' +
      '<div>' +
        '<div class="sec"><div class="sec-title">' + (t.lint||'Interesser') + '</div><div class="ints">' + ints + '</div></div>' +
        '<div class="sec" style="margin-top:10px"><div class="sec-title">' + (t.llng||'Språk') + '</div>' + langs + '</div>' +
      '</div>' +
    '</div>';

  /* CONTACT */
  var contacts = '';
  P.document.querySelectorAll('.cg .ci').forEach(function(ci) {
    var lbl = ci.querySelector('.cl2') ? ci.querySelector('.cl2').textContent.trim() : '';
    var val = ci.querySelector('.cv2') ? ci.querySelector('.cv2').textContent.trim() : '';
    contacts += '<div class="contact-item"><div class="contact-lbl">' + lbl + '</div><div class="contact-val">' + val + '</div></div>';
  });
  html += '<div class="sec" style="margin-top:12px"><div class="sec-title">' + (t.lci||'Kontakt') + '</div><div class="contact-grid">' + contacts + '</div></div>';

  document.getElementById('out').innerHTML = html;
}
</script>
</body>
</html>
